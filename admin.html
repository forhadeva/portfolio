<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <div id="loginOverlay">
        <div class="login-box">
            <h2>Admin<span>Login</span></h2>
            <div class="form-group">
                <input type="password" id="adminPassword" placeholder="Enter Password">
            </div>
            <button class="btn" id="loginBtn">Login</button>
            <p id="loginError">Incorrect password!</p>
        </div>
    </div>

    <div class="admin-container" id="adminContent" style="display: none;">
        <header class="admin-header">
            <h1>Admin<span>Panel</span></h1>
            <div class="header-actions">
                <a href="index.html" class="btn btn-secondary"><i class="fa-solid fa-eye"></i> View Site</a>
                <button class="btn" id="addProjectBtn"><i class="fa-solid fa-plus"></i> Add Project</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Projects</h3>
                <p id="total-projects">0</p>
            </div>
            <div class="stat-card">
                <h3>Messages</h3>
                <p id="total-messages">0</p>
            </div>
            <div class="stat-card">
                <h3>CV Status</h3>
                <p id="cv-status">Not Set</p>
            </div>
        </div>

        <div class="tabs" style="margin-bottom: 2rem; display: flex; gap: 1rem;">
            <button class="btn btn-secondary tab-btn active" id="projectsTab">Projects</button>
            <button class="btn btn-secondary tab-btn" id="messagesTab">Messages</button>
            <button class="btn btn-secondary tab-btn" id="settingsTab">Settings</button>
        </div>

        <div id="projectsSection">
            <div class="project-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Num</th>
                            <th>Image</th>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Link</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-projects-list"></tbody>
                </table>
            </div>
        </div>

        <div id="messagesSection" style="display: none;">
            <div class="project-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Message</th>
                        </tr>
                    </thead>
                    <tbody id="admin-messages-list"></tbody>
                </table>
            </div>
        </div>

        <div id="settingsSection" style="display: none;">
            <div class="stat-card" style="max-width: 500px; margin: 0 auto;">
                <h3>Global Settings</h3>
                <form id="settingsForm">
                    <div class="form-group">
                        <label>CV Download Link / Path</label>
                        <input type="text" id="cvLink" placeholder="e.g. cv/my-cv.pdf" required>
                    </div>
                    <button type="submit" class="btn">Update Settings</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Add New Project</h2>
            <form id="projectForm">
                <input type="hidden" id="projectId">
                <div class="form-group">
                    <label>Project Number (e.g., 01)</label>
                    <input type="text" id="projectNum" placeholder="e.g. 01">
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="projectTitle" required placeholder="Project Title">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="projectCat" placeholder="e.g. Web Design">
                </div>
                <div class="form-group">
                    <label>Technologies</label>
                    <input type="text" id="projectTech" placeholder="e.g. HTML, CSS, JS">
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="projectImage" placeholder="img/project.jpg">
                </div>
                <div class="form-group">
                    <label>Project Live Link</label>
                    <input type="text" id="projectLink" placeholder="https://...">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="closeModalBtn">Cancel</button>
                    <button type="submit" class="btn">Save Project</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        const SECRET_PASSWORD = 'admin';
        let currentProjects = [];

        // Auth Logic
        function checkPassword() {
            const pass = document.getElementById('adminPassword').value;
            if (pass === SECRET_PASSWORD) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                showAdmin();
            } else {
                const err = document.getElementById('loginError');
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 3000);
            }
        }

        document.getElementById('loginBtn').onclick = checkPassword;
        document.getElementById('adminPassword').onkeypress = (e) => { if (e.key === 'Enter') checkPassword(); };

        function showAdmin() {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            loadData();
        }

        async function loadData() {
            renderAdminTable();
            renderMessagesTable();
            loadSettings();
        }

        async function loadSettings() {
            try {
                const docSnap = await db.collection("settings").doc("main").get();
                console.log("Firestore Connection Successful");
                if (docSnap.exists) {
                    const data = docSnap.data();
                    document.getElementById('cvLink').value = data.cvLink || '';
                    document.getElementById('cv-status').textContent = data.cvLink ? 'Active' : 'Not Set';
                }
            } catch (e) {
                console.error("Error loading settings (Connectivity Check):", e);
                document.getElementById('cv-status').textContent = 'Conn. Error';
            }
        }

        document.getElementById('settingsForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;

            let cvLink = document.getElementById('cvLink').value;

            // Check for absolute Windows paths and warn
            if (cvLink.includes(':') || cvLink.startsWith('\\\\')) {
                if (!confirm('You entered an absolute path (like E:\\...). This might not work in all browsers. It is better to use a relative path like "cv/my-cv.pdf". Do you want to continue anyway?')) {
                    return;
                }
            }

            // Convert Windows backslashes to forward slashes
            cvLink = cvLink.replace(/\\/g, '/');

            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                await db.collection("settings").doc("main").set({ cvLink });
                document.getElementById('cv-status').textContent = cvLink ? 'Active' : 'Not Set';
                alert('Settings updated successfully!');
            } catch (e) {
                console.error("Firestore Error:", e);
                alert('Error updating settings: ' + e.message + '\n\nMake sure Firestore is enabled in your Firebase Console.');
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        };

        async function renderAdminTable() {
            const tbody = document.getElementById('admin-projects-list');
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Loading projects...</td></tr>';
            try {
                const querySnapshot = await db.collection("projects").get();
                currentProjects = [];
                querySnapshot.forEach((doc) => {
                    currentProjects.push({ id: doc.id, ...doc.data() });
                });
                tbody.innerHTML = currentProjects.map((p) => `
                    <tr>
                        <td>${p.num}</td>
                        <td><img src="${p.image}" class="project-img-preview"></td>
                        <td>${p.title}</td>
                        <td>${p.category}</td>
                        <td><a href="${p.link}" target="_blank" style="color: var(--main-color);"><i class="fa-solid fa-link"></i></a></td>
                        <td class="actions">
                            <button class="btn btn-sm edit-btn" data-id="${p.id}"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn btn-sm btn-danger delete-btn" data-id="${p.id}"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
                document.getElementById('total-projects').textContent = currentProjects.length;
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.onclick = () => editProject(btn.dataset.id);
                });
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.onclick = () => deleteProject(btn.dataset.id);
                });
            } catch (e) {
                console.error(e);
                tbody.innerHTML = '<tr><td colspan="6">Error loading projects.</td></tr>';
            }
        }

        async function renderMessagesTable() {
            const tbody = document.getElementById('admin-messages-list');
            try {
                const querySnapshot = await db.collection("messages").orderBy("timestamp", "desc").get();
                const messages = [];
                querySnapshot.forEach((doc) => {
                    messages.push({ id: doc.id, ...doc.data() });
                });
                tbody.innerHTML = messages.map((m) => `
                    <tr>
                        <td>${m.timestamp ? m.timestamp.toDate().toLocaleDateString() : 'N/A'}</td>
                        <td>${m.name}</td>
                        <td>${m.email}</td>
                        <td>${m.message}</td>
                    </tr>
                `).join('');
                document.getElementById('total-messages').textContent = messages.length;
            } catch (e) {
                console.error(e);
            }
        }

        function openModal(isEdit = false) {
            document.getElementById('modalTitle').textContent = isEdit ? 'Edit Project' : 'Add New Project';
            if (!isEdit) {
                document.getElementById('projectForm').reset();
                document.getElementById('projectId').value = '';
            }
            document.getElementById('projectModal').style.display = 'flex';
        }

        async function editProject(id) {
            const p = currentProjects.find(item => item.id === id);
            if (!p) return;
            document.getElementById('projectId').value = id;
            document.getElementById('projectNum').value = p.num;
            document.getElementById('projectTitle').value = p.title;
            document.getElementById('projectCat').value = p.category;
            document.getElementById('projectTech').value = p.technologies;
            document.getElementById('projectImage').value = p.image;
            document.getElementById('projectLink').value = p.link;
            openModal(true);
        }

        async function deleteProject(id) {
            if (confirm('Are you sure?')) {
                try {
                    await db.collection("projects").doc(id).delete();
                    renderAdminTable();
                } catch (e) { alert('Error deleting project'); }
            }
        }

        document.getElementById('projectForm').onsubmit = async (e) => {
            e.preventDefault();
            console.log("Save initiated...");

            if (typeof db === 'undefined') {
                alert("Firebase not initialized! Check firebase-config.js");
                return;
            }

            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;

            const id = document.getElementById('projectId').value;
            const data = {
                num: document.getElementById('projectNum').value || '01',
                title: document.getElementById('projectTitle').value,
                category: document.getElementById('projectCat').value || 'General',
                technologies: document.getElementById('projectTech').value || 'Web Tech',
                image: document.getElementById('projectImage').value || 'img/default.jpg',
                link: document.getElementById('projectLink').value || '#'
            };

            console.log("Data to save:", data);
            btn.disabled = true;
            btn.textContent = 'Saving...';

            // Set a timeout to catch hanging connections
            const timeout = setTimeout(() => {
                btn.disabled = false;
                btn.textContent = originalText;
                alert("Saving is taking too long. This usually means:\n1. Firestore is not enabled in Firebase Console.\n2. Security Rules are blocking writes.\n3. Internet connection issue.");
            }, 10000); // 10 seconds timeout

            try {
                if (id) {
                    console.log("Updating project:", id);
                    await db.collection("projects").doc(id).set(data);
                } else {
                    console.log("Adding new project...");
                    await db.collection("projects").add(data);
                }
                clearTimeout(timeout);
                console.log("Save successful!");
                document.getElementById('projectModal').style.display = 'none';
                renderAdminTable();
                alert('Project saved successfully!');
            } catch (e) {
                clearTimeout(timeout);
                console.error("Firestore Error Detail:", e);
                alert('Error saving project: ' + e.message + '\n\nCheck your Firebase Console Security Rules.');
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        };

        document.getElementById('addProjectBtn').onclick = () => openModal();
        document.getElementById('closeModalBtn').onclick = () => document.getElementById('projectModal').style.display = 'none';

        document.getElementById('projectsTab').onclick = () => {
            document.getElementById('projectsSection').style.display = 'block';
            document.getElementById('messagesSection').style.display = 'none';
            document.getElementById('settingsSection').style.display = 'none';
            document.getElementById('projectsTab').classList.add('active');
            document.getElementById('messagesTab').classList.remove('active');
            document.getElementById('settingsTab').classList.remove('active');
        };
        document.getElementById('messagesTab').onclick = () => {
            document.getElementById('projectsSection').style.display = 'none';
            document.getElementById('messagesSection').style.display = 'block';
            document.getElementById('settingsSection').style.display = 'none';
            document.getElementById('projectsTab').classList.remove('active');
            document.getElementById('messagesTab').classList.add('active');
            document.getElementById('settingsTab').classList.remove('active');
        };

        document.getElementById('settingsTab').onclick = () => {
            document.getElementById('projectsSection').style.display = 'none';
            document.getElementById('messagesSection').style.display = 'none';
            document.getElementById('settingsSection').style.display = 'block';
            document.getElementById('projectsTab').classList.remove('active');
            document.getElementById('messagesTab').classList.remove('active');
            document.getElementById('settingsTab').classList.add('active');
        };

        window.onload = async () => {
            if (sessionStorage.getItem('adminLoggedIn') === 'true') showAdmin();

            // Background connection check
            try {
                await db.collection("projects").limit(1).get();
                console.log("Admin: Connection test passed.");
            } catch (e) {
                console.error("Admin: Initial connection test failed:", e);
                alert("⚠️ DATABASE CONNECTION FAILED!\n\nThis means the admin panel cannot talk to Firebase. Please check:\n1. Your Internet connection.\n2. In Firebase Console, make sure 'Firestore' is created.\n3. In 'Rules' tab, check if it is 'allow read, write: if true;'");
            }
        };
    </script>
</body>

</html>
